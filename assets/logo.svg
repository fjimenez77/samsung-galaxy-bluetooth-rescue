<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Z Fold Bluetooth Rescue logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2BA6FF"/>
      <stop offset="1" stop-color="#0B53D0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- tile -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#glow)"/>

  <!-- foldable hinge crease -->
  <rect x="123" y="40" width="10" height="176" rx="5" fill="#ffffff" opacity="0.12"/>

